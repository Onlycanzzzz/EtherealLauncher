name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        
      - name: Build
        run: |
          xmake f -p windows -m release
          xmake
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EtherealLauncher-Windows
          path: build/windows/x64/release/EtherealLauncher.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        
      - name: Build
        run: |
          xmake f -p macosx -m release
          xmake
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EtherealLauncher-macOS
          path: build/macosx/x64/release/EtherealLauncher

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      
      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        
      - name: Build
        run: |
          xmake f -p linux -m release
          xmake
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EtherealLauncher-Linux
          path: build/linux/x86_64/release/EtherealLauncher

  test:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      
      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
      
      - name: Run tests
        run: |
          xmake f -p linux -m debug
          xmake
          xmake run test